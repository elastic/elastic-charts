# TODO move this run to buildkite

name: Publish a Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "`--dry-run`? Run the workflow without publishing a release"
        required: true
        default: false
        type: boolean
      publish_pages:
        description: "Publish `elastic.github.io/elastic-charts` site?"
        required: true
        default: true
        type: boolean
      pages_target_branch:
        description: "github.io branch, only change when testing"
        required: true
        default: gh-pages
        type: string

permissions:
  contents: read # for checkout

env:
  ECH_NODE_VERSION: '22.22.0'
  RELEASE_SITE_DIR: .release-site

jobs:
  checks:
    name: Release Checks
    runs-on: ubuntu-latest
    # needs: status # Not working atm
    # Runs checks when others running on main may be in process
    # This is likely an edge case unless published shortly following a merge
    # This also covers a case where main checks did not complete/succeed
    # if: needs.status.outputs.allSuccess
    steps:
      - name: Check out repository
        uses: actions/checkout@v4.1.7
        with:
          persist-credentials: false
      - name: Setup node
        uses: actions/setup-node@v4.0.2
        with:
          node-version: ${{ env.ECH_NODE_VERSION }}

      # TODO: fix unnecessary yarn installs
      - name: Install node_modules
        uses: bahmutov/npm-install@v1.10.9
        with:
          useRollingCache: true
      - name: Install e2e node_modules
        uses: bahmutov/npm-install@v1.10.9
        with:
          working-directory: e2e
          useRollingCache: true
      - name: Install buildkite node_modules
        uses: bahmutov/npm-install@v1.10.9
        with:
          working-directory: .buildkite
          useRollingCache: true

      # TODO: fix this to avoid requiring build to run linting
      # currently the storybook and others are loosely coupled to @elastic/charts/src
      # such that types point to the local source and not a packaged release
      - name: Build charts typescript lib
        run: yarn build:ts
      - name: Lint check
        run: yarn lint
      - name: Prettier check
        run: yarn prettier:check
      - name: TimeZone testing
        run: yarn test:tz --ci
      - name: Testing
        run: yarn test --ci

  release:
    name: Release
    needs: [checks]
    if: ${{ needs.checks.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # to be able to publish a GitHub release
      issues: write # to be able to comment on released issues
      pull-requests: write # to be able to comment on released pull requests
      id-token: write # to enable use of OIDC for trusted publishing and npm provenance
    steps:
      - name: Check out repository
        uses: actions/checkout@v4.1.7
        with:
          persist-credentials: false
      - name: Setup node
        uses: actions/setup-node@v4.0.2
        with:
          node-version: ${{ env.ECH_NODE_VERSION }}

      - name: Install node_modules
        uses: bahmutov/npm-install@v1.10.9
        with:
          useRollingCache: true
      - name: Install docs node_modules
        uses: bahmutov/npm-install@v1.10.9
        with:
          working-directory: docs
          useRollingCache: true
      - name: Install Buildkite node_modules
        uses: bahmutov/npm-install@v1.10.9
        with:
          working-directory: .buildkite
          useRollingCache: true

      - name: Validate Pages publish parameters
        if: ${{ inputs.dry_run && inputs.publish_pages && inputs.pages_target_branch == 'gh-pages' }}
        run: |
          echo "Dry-run releases may only publish to a non-production Pages branch." >&2
          exit 1

      - name: Build library
        run: yarn build

      - name: Build release site
        run: yarn --cwd .buildkite build:release-site

      - name: Upload release site artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-site
          path: ${{ env.RELEASE_SITE_DIR }}
          retention-days: 5
          include-hidden-files: true

      - name: Upgrade npm for trusted publishing (OIDC) support
        if: ${{ !inputs.dry_run }}
        run: npm install -g npm@11.5.1

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.ADMIN_TOKEN_GH }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            yarn semantic-release --dry-run
          else
            yarn semantic-release
          fi

      - name: Publish GitHub Pages branch
        if: ${{ inputs.publish_pages }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.ADMIN_TOKEN_GH }}
          publish_branch: ${{ inputs.pages_target_branch }}
          publish_dir: ${{ env.RELEASE_SITE_DIR }}
          force_orphan: true
          user_name: elastic-datavis[bot]
          user_email: 98618603+elastic-datavis[bot]@users.noreply.github.com
          full_commit_message: Deploy release site for ${{ github.sha }}
